</head>

<body>

  <!-- Main Container -->
  <div class="container">

    <header>
      <a href="index.html" class="logo">
        <img src="images/main_logo_v3.png" alt="瀬谷すくすく保育園" class="logo-img">
      </a>
      <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <!-- Hamburger Menu Overlay -->
      <nav class="mobile-nav">
        <img src="images/rabbit_menu.png" alt="うさぎ" class="menu-rabbit">
        <ul>
          <li><a href="index.html">トップ</a></li>
          <li><a href="index.html#access">アクセス</a></li>
          <li><a href="about.html">園について</a></li>
          <li><a href="daily.html">日常とイベント</a></li>
          <li><a href="admission.html">入園・見学のご案内</a></li>
          <li><a href="download.html">書類ダウンロード</a></li>
          <li><a href="faq.html">よくあるご質問</a></li>
        </ul>
        <div class="nav-contact">
          <a href="contact.html" class="btn btn-primary"><i class="fa-regular fa-envelope"></i> お問い合わせ</a>
        </div>
      </nav>
    </header>

    <main class="page-content pt-top">

      <h2 class="section-title">お問い合わせ</h2>

      <!-- Contact Section -->
      <section id="contact-form" class="card fade-in">

        <p style="font-size: 0.9rem; text-align: center; margin-bottom: 0.5rem;">
          お急ぎの場合は、お電話にてご連絡ください。
        </p>
        <div style="text-align: center; margin-bottom: 1.5rem;">
          <strong style="font-size: 1.5rem; display: inline-block; margin: 0.5rem 0;">TEL: <a href="tel:045-442-7123"
              style="color: var(--primary-color);">045-442-7123</a></strong><br>
          <span style="font-size: 0.9rem; color: var(--text-light);">（受付時間：月〜土 7:00〜19:00）</span>
        </div>

        <form action="#" method="POST" class="contact-form">
          <div class="form-group">
            <label for="category">お問い合わせの種類</label>
            <select id="category" name="category">
              <option value="見学について">入園・見学について</option>
              <option value="採用について">採用について</option>
              <option value="その他">その他のお問い合わせ</option>
            </select>
          </div>

          <div class="form-group">
            <label for="name">お名前 <span class="required">必須</span></label>
            <input type="text" id="name" name="name" required placeholder="例）瀬谷 太郎">
          </div>

          <div class="form-group">
            <label for="email">メールアドレス <span class="required">必須</span></label>
            <input type="email" id="email" name="email" required placeholder="例）example@suku2.jp">
          </div>

          <div class="form-group">
            <label for="email_confirm">メールアドレス（確認） <span class="required">必須</span></label>
            <input type="email" id="email_confirm" name="email_confirm" required placeholder="もう一度入力してください">
          </div>

          <div class="form-group">
            <label for="phone">電話番号</label>
            <input type="tel" id="phone" name="phone" placeholder="例）090-1234-5678">
          </div>

          <div class="form-group">
            <label for="message">お問い合わせ内容 <span class="required">必須</span></label>
            <textarea id="message" name="message" rows="5" required placeholder="ご質問やご相談内容をご記入ください。"></textarea>
          </div>

          <button type="submit" class="btn btn-primary"
            style="width: 100%; margin-top: 1rem; border: none;">送信する</button>
        </form>

        <script>
          function validateContactForm(event) {
            const email = document.getElementById('email').value;
            const emailConfirm = document.getElementById('email_confirm').value;

            if (email !== emailConfirm) {
              alert('メールアドレスが一致しません。');
              event.preventDefault();
              return false;
            }

            alert('お問い合わせを受け付けました。');
            event.preventDefault(); // デモ用：実際にはサーバーに送る場合はここを削除
            return true;
          }

          // 既存のonsubmitを上書きまたは紐付け
          document.querySelector('.contact-form').onsubmit = validateContactForm;
        </script>

      </section>

    </main>

      </nav>

        &copy; 2026 瀬谷すくすく保育園 All Rights Reserved.
      </p>
    </footer>

  </div>

  <script src="js/main.js"></script>
</body>
